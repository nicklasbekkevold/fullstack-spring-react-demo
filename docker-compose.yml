services:
  spring-boot-app:
    build:
      context: backend
    ports:
      - "8080:8080"
    network_mode: host
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  react-app:
    build:
      context: frontend
    ports:
      - "3000:80"
    restart: on-failure
    network_mode: host
